    function prettify(name){
      const s = name.replace(/\/+$/,'').replace(/[-_]/g,' ');
      return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    }

    function getImagePath(gameName) {
      // Convert game name to image filename (lowercase, no special chars)
      const clean = gameName.replace(/\/+$/,'').replace('.html', '');
      const imageName = clean.toLowerCase().replace(/[-_]/g, '');
      return `assets/gameimages/${imageName}.png`;
    }

    function loadGames() {
      const grid = document.getElementById('gamesGrid');
      const loader = document.getElementById('loader');
      const loadingText = document.getElementById('loadingText');

      // Simulate loading delay for visual effect
      setTimeout(() => {
        loader.style.display = 'none';
        loadingText.style.display = 'none';

        for(const g of games){
          if(!g || g === '.DS_Store') continue;
          const clean = g.replace(/\/+$/,'');
          const href = (clean.endsWith('.html')) ? `assets/games/${clean}` : `assets/games/${clean}/index.html`;

          const a = document.createElement('a');
          a.className = 'card';
          a.href = href;
          a.target = '_self';
          a.style.backgroundImage = `url('${getImagePath(clean)}')`;

          const title = document.createElement('div');
          title.className = 'title';
          title.textContent = prettify(clean.replace('.html',''));

          a.appendChild(title);
          grid.appendChild(a);
        }
      }, 600);
    }

    loadGames();

    /* ========= SETTINGS SYSTEM ========= */
    const settings = {
      animationEnabled: localStorage.getItem('animationEnabled') !== 'false',
      theme: localStorage.getItem('theme') || 'theme-bw',
      urlSpoof: localStorage.getItem('urlSpoof') || ''
    };

    function applySetting(key, value) {
      if (key === 'animationEnabled') {
        document.body.classList.toggle('animations-disabled', !value);
      } else if (key === 'theme') {
        document.body.className = document.body.className.replace(/theme-\w+/, value);
        document.body.classList.add(value);
      }
      localStorage.setItem(key, value);
    }

    function initializeSettings() {
      document.body.classList.add(settings.theme);
      if (!settings.animationEnabled) {
        document.body.classList.add('animations-disabled');
      }
    }

    initializeSettings();

    /* ========= SNOW PARTICLES ========= */

    // Snow renderer reused from index (simple)
    (function(){
      const canvas = document.getElementById('snow');
      const ctx = canvas.getContext('2d');
      function fit(){ canvas.width = innerWidth; canvas.height = innerHeight; }
      fit(); window.addEventListener('resize', fit);
      const flakes = Array.from({length:120}).map(()=>({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*3+1, d:Math.random() }));
      let angle = 0;
      function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='white'; ctx.beginPath(); for(const f of flakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); } ctx.fill(); angle+=0.01; for(let i=0;i<flakes.length;i++){ const f=flakes[i]; f.y+=Math.pow(f.d,2)+0.8; f.x+=Math.sin(angle)*0.4; if(f.y>canvas.height) flakes[i]={ x:Math.random()*canvas.width, y:0, r:f.r, d:f.d }; } }
      setInterval(draw,33);
    })();
