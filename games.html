    function prettify(name){
      const s = name.replace(/\/+$/,'').replace(/[-_]/g,' ');
      return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    }

    function getImagePath(gameName) {
      // Convert game name to image filename (lowercase, no special chars)
      const clean = gameName.replace(/\/+$/,'').replace('.html', '');
      const imageName = clean.toLowerCase().replace(/[-_]/g, '');
      return `assets/gameimages/${imageName}.png`;
    }

    function loadGames(filter = '') {
      const grid = document.getElementById('gamesGrid');
      const loader = document.getElementById('loader');
      const loadingText = document.getElementById('loadingText');

      // Simulate loading delay for visual effect
      setTimeout(() => {
        loader.style.display = 'none';
        loadingText.style.display = 'none';

        // Clear existing cards
        grid.innerHTML = '';

        let displayedCount = 0;
        for(const g of games){
          if(!g || g === '.DS_Store') continue;
          const clean = g.replace(/\/+$/,'');
          const displayName = prettify(clean.replace('.html',''));
          
          // Filter based on search
          if(filter && !displayName.toLowerCase().includes(filter.toLowerCase())) {
            continue;
          }

          const href = (clean.endsWith('.html')) ? `assets/games/${clean}` : `assets/games/${clean}/index.html`;

          const a = document.createElement('a');
          a.className = 'card';
          a.style.backgroundImage = `url('${getImagePath(clean)}')`;
          a.style.cursor = 'pointer';

          const title = document.createElement('div');
          title.className = 'title';
          title.textContent = displayName;

          a.appendChild(title);
          
          // Click handler to open game in panel
          a.addEventListener('click', (e) => {
            e.preventDefault();
            openGamePanel(displayName, href);
          });
          
          grid.appendChild(a);
          displayedCount++;
        }

        // Show "no results" message if no games match
        if(displayedCount === 0 && filter) {
          const noResults = document.createElement('div');
          noResults.style.cssText = 'grid-column: 1 / -1; text-align: center; color: #cccccc; padding: 40px;';
          noResults.textContent = 'No games found matching "' + filter + '"';
          grid.appendChild(noResults);
        }
      }, 600);
    }

    function openGamePanel(gameName, gameUrl) {
      const panel = document.getElementById('gamePanel');
      const overlay = document.getElementById('gamePanelOverlay');
      const title = document.getElementById('gamePanelTitle');
      const frame = document.getElementById('gameFrame');
      const loader = document.getElementById('gamePanelLoader');

      title.textContent = gameName;
      
      // Show loader
      loader.classList.remove('hidden');
      
      // Set iframe src
      frame.src = '';
      
      // Apply URL spoofer if enabled (client-side only)
      let finalUrl = gameUrl;
      if(settings.urlSpoof && settings.urlSpoof.trim()) {
        // Create a simple loader page that references the spoof URL
        // This is done by creating a data URI that loads the game from the specified path
        const spoofedPath = settings.urlSpoof.endsWith('/') 
          ? settings.urlSpoof + gameUrl.split('/').pop() 
          : settings.urlSpoof;
        
        // Create an HTML page that sets the referrer and loads the game
        const loaderHtml = `<!DOCTYPE html>
<html>
<head>
  <meta name="referrer" content="no-referrer">
  <style>body { margin: 0; padding: 0; }</style>
</head>
<body>
  <iframe id="gameFrame" src="${gameUrl}" style="width:100%;height:100%;border:none;" allow="autoplay; fullscreen"></iframe>
  <script>
    // Spoof URL reference
    window.location.href = '${spoofedPath}#${btoa(gameUrl)}';
  <\/script>
</body>
</html>`;
        
        const blob = new Blob([loaderHtml], { type: 'text/html' });
        finalUrl = URL.createObjectURL(blob);
      }
      
      frame.src = finalUrl;
      
      // Hide loader when iframe loads
      frame.onload = function() {
        setTimeout(() => {
          loader.classList.add('hidden');
        }, 300);
      };
      
      // Show panel
      panel.classList.add('active');
      overlay.classList.add('active');
      
      // Prevent body scroll when panel is open
      document.body.style.overflow = 'hidden';
    }

    function closeGamePanel() {
      const panel = document.getElementById('gamePanel');
      const overlay = document.getElementById('gamePanelOverlay');
      const frame = document.getElementById('gameFrame');

      panel.classList.remove('active');
      overlay.classList.remove('active');
      frame.src = '';
      
      // Restore body scroll
      document.body.style.overflow = 'auto';
    }

    loadGames();

    /* ========= SETTINGS SYSTEM ========= */
    const settings = {
      animationEnabled: localStorage.getItem('animationEnabled') !== 'false',
      theme: localStorage.getItem('theme') || 'theme-bw',
      urlSpoof: localStorage.getItem('urlSpoof') || ''
    };

    function applySetting(key, value) {
      if (key === 'animationEnabled') {
        document.body.classList.toggle('animations-disabled', !value);
      } else if (key === 'theme') {
        document.body.className = document.body.className.replace(/theme-\w+/, value);
        document.body.classList.add(value);
      }
      localStorage.setItem(key, value);
    }

    function initializeSettings() {
      document.body.classList.add(settings.theme);
      if (!settings.animationEnabled) {
        document.body.classList.add('animations-disabled');
      }
    }

    initializeSettings();

    /* ========= SEARCH FUNCTIONALITY ========= */
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      loadGames(e.target.value);
    });

    /* ========= GAME PANEL CONTROLS ========= */
    const gamePanelClose = document.getElementById('gamePanelClose');
    const gamePanelOverlay = document.getElementById('gamePanelOverlay');
    
    gamePanelClose.addEventListener('click', closeGamePanel);
    gamePanelOverlay.addEventListener('click', closeGamePanel);

    // Close panel with Escape key
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') {
        closeGamePanel();
      }
    });

    /* ========= SNOW PARTICLES ========= */

    // Snow renderer reused from index (simple)
    (function(){
      const canvas = document.getElementById('snow');
      const ctx = canvas.getContext('2d');
      function fit(){ canvas.width = innerWidth; canvas.height = innerHeight; }
      fit(); window.addEventListener('resize', fit);
      const flakes = Array.from({length:120}).map(()=>({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*3+1, d:Math.random() }));
      let angle = 0;
      function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='white'; ctx.beginPath(); for(const f of flakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); } ctx.fill(); angle+=0.01; for(let i=0;i<flakes.length;i++){ const f=flakes[i]; f.y+=Math.pow(f.d,2)+0.8; f.x+=Math.sin(angle)*0.4; if(f.y>canvas.height) flakes[i]={ x:Math.random()*canvas.width, y:0, r:f.r, d:f.d }; } }
      setInterval(draw,33);
    })();
  </script>
