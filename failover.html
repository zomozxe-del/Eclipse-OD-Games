<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Failover Manager</title>
  <style>
    body{font-family:Segoe UI, Roboto, Arial, sans-serif;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{max-width:720px;padding:24px;border-radius:12px;background:rgba(255,255,255,0.04);text-align:center}
    .status{margin-top:12px;color:#fff}
    .btn{margin-top:18px;padding:10px 14px;border-radius:8px;background:#fff;color:#000;border:none;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h2>Site Failover Manager</h2>
    <p>Checking primary site availability and redirecting to backup if necessary.</p>
    <div id="status" class="status">Checking primary...</div>
    <button id="retry" class="btn" style="display:none">Retry</button>
  </div>

<script>
const primary = 'https://education-eclipse.netlify.app/';
const backup = 'https://eclipse0nt0p.netlify.app/';
const TIMEOUT = 6000;

function checkPrimary(timeout = TIMEOUT){
  return Promise.race([
    fetch(primary, { mode: 'no-cors', cache: 'no-store' }),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeout))
  ]);
}

function redirectToBackup(reason){
  const url = new URL(backup);
  url.searchParams.set('fail', 'true');
  url.searchParams.set('from', primary.replace(/^https?:\/\//,''));
  url.searchParams.set('time', new Date().toISOString());
  url.searchParams.set('reason', reason || 'unreachable');
  document.getElementById('status').textContent = 'Primary unreachable — redirecting to backup...';
  setTimeout(() => location.href = url.toString(), 900);
}

function startCheck(){
  document.getElementById('status').textContent = 'Checking primary...';
  document.getElementById('retry').style.display = 'none';
  checkPrimary().then(() => {
    document.getElementById('status').textContent = 'Primary reachable — opening primary now.';
    setTimeout(() => location.href = primary, 700);
  }).catch((err) => {
    console.warn('Primary check failed:', err);
    redirectToBackup(err.message || 'failure');
    document.getElementById('retry').style.display = 'inline-block';
  });
}

startCheck();

document.getElementById('retry').addEventListener('click', startCheck);
</script>
</body>
</html>
