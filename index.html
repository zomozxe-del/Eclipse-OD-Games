<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eclipse OD</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at top, #0b0b12, #000);
    color: white;
    overflow: hidden;
}

/* Snow canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Center layout */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
}

/* Title */
h1 {
    font-size: 90px;
    letter-spacing: 6px;
    text-shadow: 0 0 25px rgba(255,255,255,0.15);
    transform: translateY(40px);
    animation: rise 1.5s ease forwards;
}

.subtitle {
    font-size: 22px;
    margin-top: 12px;
    color: #aaa;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 0.6s;
}

/* Game grid */
.games {
    margin-top: 60px;
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 1.2s;
}

/* Game cards */
.game {
    width: 170px;
    height: 110px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: white;
    font-size: 18px;
    transition: 0.35s ease;
    backdrop-filter: blur(8px);
}

.game:hover {
    transform: translateY(-8px) scale(1.07);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* Animations */
@keyframes fadeIn {
    to { opacity: 1; }
}

@keyframes rise {
    to {
        transform: translateY(0);
    }
}

/* Game modal */
#game-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
}

#game-modal.open {
    display: flex;
}

#game-iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
    background: #000;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

#game-close {
    position: absolute;
    top: 18px;
    right: 18px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 10000;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="container">
    <h1>Eclipse OD</h1>
    <div class="subtitle">– zomo</div>

    <div class="games">
        <a class="game" id="play-polytrack" href="#">Play PolyTrack</a>
        <a class="game" href="#">Game 2</a>
        <a class="game" href="#">Game 3</a>
        <a class="game" href="#">Game 4</a>
    </div>
</div>
<script>

/* ========= SNOW PARTICLES ========= */
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let flakes = [];

for (let i = 0; i < 140; i++) {
    flakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        d: Math.random() * 1
    });
}

let angle = 0;

function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let f of flakes) {
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    }

    ctx.fill();
    moveSnow();
}

function moveSnow() {
    angle += 0.01;

    for (let i = 0; i < flakes.length; i++) {
        let f = flakes[i];

        f.y += Math.pow(f.d, 2) + 0.8;
        f.x += Math.sin(angle) * 0.4;

        if (f.y > canvas.height) {
            flakes[i] = {
                x: Math.random() * canvas.width,
                y: 0,
                r: f.r,
                d: f.d
            };
        }
    }
}

setInterval(drawSnow, 33);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

<!-- PolyTrack game modal -->
<div id="game-modal" aria-hidden="true">
    <button id="game-close">Close ✕</button>
    <iframe id="game-iframe" src="games/PolyTrack/public/assets/games/poly-track/poly-track.html" allow="fullscreen"></iframe>
</div>

<script>
// Wire Play button to open the PolyTrack iframe modal
(() => {
    const playBtn = document.getElementById('play-polytrack');
    const modal = document.getElementById('game-modal');
    const closeBtn = document.getElementById('game-close');

    if (!playBtn || !modal) return;

    function openModal(e) {
        if (e) e.preventDefault();
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
    }

    playBtn.addEventListener('click', openModal);
    closeBtn && closeBtn.addEventListener('click', closeModal);

    // Close on Escape
    window.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape') closeModal();
    });
})();
</script>

</body>
</html>
