<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eclipse OD</title>

<link rel="stylesheet" href="assets/css/site.css">
</head>

<body>

<canvas id="snow"></canvas>

<div class="container">
    <h1>Eclipse OD</h1>
    <div class="subtitle">– zomo</div>

    <div class="games">
        <a class="game" id="play-polytrack" href="#">Play PolyTrack</a>
        <a class="game" href="#">Game 2</a>
        <a class="game" href="#">Game 3</a>
        <a class="game" href="#">Game 4</a>
    </div>
</div>
<script>

/* ========= SNOW PARTICLES ========= */

const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const flakes = [];

for (let i = 0; i < 140; i++) {
    flakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        d: Math.random() * 1
    });
}

let angle = 0;

function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let f of flakes) {
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    }

    ctx.fill();
    moveSnow();
}

function moveSnow() {
    angle += 0.01;

    for (let i = 0; i < flakes.length; i++) {
        let f = flakes[i];

        f.y += Math.pow(f.d, 2) + 0.8;
        f.x += Math.sin(angle) * 0.4;

        if (f.y > canvas.height) {
            flakes[i] = {
                x: Math.random() * canvas.width,
                y: 0,
                r: f.r,
                d: f.d
            };
        }
    }
}

setInterval(drawSnow, 33);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

<!-- PolyTrack game modal -->
<div id="game-modal" aria-hidden="true">
    <button id="game-close">Close ✕</button>
    <iframe id="game-iframe" src="games/PolyTrack/public/assets/games/poly-track/poly-track.html" allow="fullscreen"></iframe>
</div>

<script>
// Wire Play button to open the PolyTrack iframe modal
(() => {
    const playBtn = document.getElementById('play-polytrack');
    const modal = document.getElementById('game-modal');
    const closeBtn = document.getElementById('game-close');

    if (!playBtn || !modal) return;

    function openModal(e) {
        if (e) e.preventDefault();
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
    }

    playBtn.addEventListener('click', openModal);
    closeBtn && closeBtn.addEventListener('click', closeModal);

    // Close on Escape
    window.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape') closeModal();
    });
})();
</script>

</body>
</html>
