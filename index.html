<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eclipse OD</title>

<link rel="stylesheet" href="assets/css/site.css">
</head>

<body>

<canvas id="snow"></canvas>

<nav class="nav-tabs">
    <div class="nav-tabs-left">
        <a href="index.html" class="active">Main Page</a>
        <a href="games.html">Games</a>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙️ Settings</button>
</nav>

<div class="container">
    <h1>Eclipse OD</h1>

    <div class="quote-section">
        <p id="quote">"The only way to do great work is to love what you do." — Steve Jobs</p>
    </div>

    <div class="game-count">
        <strong id="gameCountText">200+ Games Available</strong>
    </div>
</div>
<script>

/* ========= SETTINGS SYSTEM ========= */
const settings = {
  animationEnabled: localStorage.getItem('animationEnabled') !== 'false',
  theme: localStorage.getItem('theme') || 'theme-dark',
  urlSpoof: localStorage.getItem('urlSpoof') || ''
};

function applySetting(key, value) {
  if (key === 'animationEnabled') {
    document.body.classList.toggle('animations-disabled', !value);
    document.querySelectorAll('[style*="animation"]').forEach(el => {
      if (!value) el.classList.add('no-animation');
      else el.classList.remove('no-animation');
    });
  } else if (key === 'theme') {
    document.body.className = document.body.className.replace(/theme-\w+/, value);
    document.body.classList.add(value);
  }
  localStorage.setItem(key, value);
}

function initializeSettings() {
  document.body.classList.add(settings.theme);
  if (!settings.animationEnabled) {
    document.body.classList.add('animations-disabled');
    document.querySelectorAll('h1, h2, .quote-section, .game-count').forEach(el => {
      el.classList.add('no-animation');
    });
  }
}

initializeSettings();

// Settings modal functionality
const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const closeBtn = document.querySelector('.close-settings');

if (settingsBtn && settingsModal) {
  settingsBtn.addEventListener('click', () => {
    settingsModal.classList.add('open');
  });
  
  closeBtn.addEventListener('click', () => {
    settingsModal.classList.remove('open');
  });
  
  settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) {
      settingsModal.classList.remove('open');
    }
  });

  // Theme selector
  document.getElementById('themeSelect').addEventListener('change', (e) => {
    const newTheme = e.target.value;
    settings.theme = newTheme;
    applySetting('theme', newTheme);
  });

  // Animation toggle
  document.getElementById('animationToggle').addEventListener('change', (e) => {
    settings.animationEnabled = e.target.checked;
    applySetting('animationEnabled', e.target.checked);
  });

  // URL Spoof option
  document.getElementById('urlSpoofInput').addEventListener('change', (e) => {
    settings.urlSpoof = e.target.value;
    localStorage.setItem('urlSpoof', e.target.value);
  });

  // Set current values
  document.getElementById('themeSelect').value = settings.theme;
  document.getElementById('animationToggle').checked = settings.animationEnabled;
  document.getElementById('urlSpoofInput').value = settings.urlSpoof;
}

/* ========= INSPIRATIONAL QUOTES ========= */
const quotes = [
    "\"The only way to do great work is to love what you do.\" — Steve Jobs",
    "\"Innovation distinguishes between a leader and a follower.\" — Steve Jobs",
    "\"Life is what happens when you're busy making other plans.\" — John Lennon",
    "\"The future belongs to those who believe in the beauty of their dreams.\" — Eleanor Roosevelt",
    "\"It is during our darkest moments that we must focus to see the light.\" — Aristotle",
    "\"The only impossible journey is the one you never begin.\" — Tony Robbins",
    "\"Believe you can and you're halfway there.\" — Theodore Roosevelt",
    "\"Dreams don't work unless you do.\" — John C. Maxwell"
];

function getRandomQuote() {
    return quotes[Math.floor(Math.random() * quotes.length)];
}

document.getElementById('quote').textContent = getRandomQuote();

/* ========= SNOW PARTICLES ========= */

const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const flakes = [];

for (let i = 0; i < 140; i++) {
    flakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        d: Math.random() * 1
    });
}

let angle = 0;

function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let f of flakes) {
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    }

    ctx.fill();
    moveSnow();
}

function moveSnow() {
    angle += 0.01;

    for (let i = 0; i < flakes.length; i++) {
        let f = flakes[i];

        f.y += Math.pow(f.d, 2) + 0.8;
        f.x += Math.sin(angle) * 0.4;

        if (f.y > canvas.height) {
            flakes[i] = {
                x: Math.random() * canvas.width,
                y: 0,
                r: f.r,
                d: f.d
            };
        }
    }
}

setInterval(drawSnow, 33);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

<!-- Settings Modal -->
<div class="settings-modal" id="settingsModal">
    <div class="settings-content">
        <button class="close-settings">✕</button>
        <h2>Settings</h2>
        
        <div class="settings-group">
            <label>
                <input type="checkbox" id="animationToggle"> Enable Animations
            </label>
        </div>

        <div class="settings-group">
            <label for="themeSelect">Theme:</label>
            <select id="themeSelect">
                <option value="theme-dark">Dark (Default)</option>
                <option value="theme-neon">Neon</option>
                <option value="theme-sunset">Sunset</option>
                <option value="theme-ocean">Ocean</option>
            </select>
        </div>

        <div class="settings-group">
            <label for="urlSpoofInput">Spoof URL (optional):</label>
            <input type="text" id="urlSpoofInput" placeholder="e.g., /games or blank">
        </div>
    </div>
</div>

</body>
</html>
