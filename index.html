<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eclipse OD</title>

<link rel="stylesheet" href="assets/css/site.css">
</head>

<body>

<canvas id="snow"></canvas>

<div class="container">
    <h1>Eclipse OD</h1>
    <div class="subtitle">– zomo</div>

    <div class="hero-actions">
        <a class="btn primary" href="games.html">Browse All Games</a>
    </div>

    <div style="margin-top:60px; text-align:center;">
        <h2 style="font-size:28px; margin-bottom:20px; color:#bdbdbd;">Featured Games</h2>
        <div class="games-grid" id="featuredGames"></div>
    </div>
</div>
<script>

/* ========= FEATURED GAMES ========= */
const featuredGames = ['drift-boss', 'subway-surfers', 'cookie-clicker', 'crossy-road', 'slope', 'minecraft-1.12', 'geometry-dash', 'flappy-bird'];

function loadFeatured() {
    const cont = document.getElementById('featuredGames');
    featuredGames.forEach(game => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = `https://education-eclipse.netlify.app/${game}`;
        a.target = '_blank';
        const name = game.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        a.innerHTML = `<div class="title">${name}</div>`;
        cont.appendChild(a);
    });
}
loadFeatured();

/* ========= SNOW PARTICLES ========= */

const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const flakes = [];

for (let i = 0; i < 140; i++) {
    flakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        d: Math.random() * 1
    });
}

let angle = 0;

function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let f of flakes) {
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    }

    ctx.fill();
    moveSnow();
}

function moveSnow() {
    angle += 0.01;

    for (let i = 0; i < flakes.length; i++) {
        let f = flakes[i];

        f.y += Math.pow(f.d, 2) + 0.8;
        f.x += Math.sin(angle) * 0.4;

        if (f.y > canvas.height) {
            flakes[i] = {
                x: Math.random() * canvas.width,
                y: 0,
                r: f.r,
                d: f.d
            };
        }
    }
}

setInterval(drawSnow, 33);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
