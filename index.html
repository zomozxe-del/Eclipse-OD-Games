<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eclipse OD</title>

<link rel="stylesheet" href="assets/css/site.css">
</head>

<body>

<canvas id="snow"></canvas>

  <!-- Failover banner placeholder (shown when redirected from manager) -->
  <div id="failoverBannerIndex" class="failover-banner" style="display:none;"></div>

<nav class="nav-tabs">
    <div class="nav-tabs-left">
        <a href="index.html" class="active">Main Page</a>
        <a href="games.html">Games</a>
    </div>
    <a href="settings.html" class="settings-btn">⚙️ Settings</a>
</nav>

<div class="container">
    <h1>Eclipse OD</h1>

    <div class="quote-section">
        <p id="quote">"The only way to do great work is to love what you do." — Steve Jobs</p>
    </div>

    <div class="game-count">
        <strong id="gameCountText">200+ Games Available</strong>
    </div>
</div>
<script>

/* ========= SETTINGS SYSTEM ========= */
const settings = {
  animationEnabled: localStorage.getItem('animationEnabled') !== 'false',
  theme: localStorage.getItem('theme') || 'theme-bw',
  urlSpoof: localStorage.getItem('urlSpoof') || '',
  lowQuality: localStorage.getItem('lowQuality') === 'true',
  cloaking: localStorage.getItem('cloaking') === 'true'
};

function applySetting(key, value) {
  if (key === 'animationEnabled') {
    document.body.classList.toggle('animations-disabled', !value);
    document.body.classList.toggle('grid-bg', !value);
    document.querySelectorAll('h1, h2, .quote-section, .game-count').forEach(el => {
      if (!value) el.classList.add('no-animation');
      else el.classList.remove('no-animation');
    });
  } else if (key === 'theme') {
    document.body.className = document.body.className.replace(/theme-\w+/, value);
    document.body.classList.add(value);
  } else if (key === 'cloaking') {
    if (value) {
      document.title = 'Google Classroom';
    } else {
      document.title = 'Eclipse OD';
    }
  }
  localStorage.setItem(key, value);
}

function initializeSettings() {
  document.body.classList.add(settings.theme);
  if (!settings.animationEnabled) {
    document.body.classList.add('animations-disabled');
    document.body.classList.add('grid-bg');
    document.querySelectorAll('h1, h2, .quote-section, .game-count').forEach(el => {
      el.classList.add('no-animation');
    });
  }
  if (settings.cloaking) {
    document.title = 'Google Classroom';
  }
}

initializeSettings();

/* ========= INSPIRATIONAL QUOTES ========= */
const quotes = [
    "\"The only way to do great work is to love what you do.\" — Steve Jobs",
    "\"Innovation distinguishes between a leader and a follower.\" — Steve Jobs",
    "\"Life is what happens when you're busy making other plans.\" — John Lennon",
    "\"The future belongs to those who believe in the beauty of their dreams.\" — Eleanor Roosevelt",
    "\"It is during our darkest moments that we must focus to see the light.\" — Aristotle",
    "\"The only impossible journey is the one you never begin.\" — Tony Robbins",
    "\"Believe you can and you're halfway there.\" — Theodore Roosevelt",
    "\"Dreams don't work unless you do.\" — John C. Maxwell",
    "\"U lowky look mad cute rn ;D\" — zomo :3"
];

function getRandomQuote() {
    return quotes[Math.floor(Math.random() * quotes.length)];
}

document.getElementById('quote').textContent = getRandomQuote();

/* ========= SNOW PARTICLES ========= */

const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const flakes = [];

for (let i = 0; i < 140; i++) {
    flakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        d: Math.random() * 1
    });
}

let angle = 0;

function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let f of flakes) {
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    }

    ctx.fill();
    moveSnow();
}

function moveSnow() {
    angle += 0.01;

    for (let i = 0; i < flakes.length; i++) {
        let f = flakes[i];

        f.y += Math.pow(f.d, 2) + 0.8;
        f.x += Math.sin(angle) * 0.4;

        if (f.y > canvas.height) {
            flakes[i] = {
                x: Math.random() * canvas.width,
                y: 0,
                r: f.r,
                d: f.d
            };
        }
    }
}

setInterval(drawSnow, 33);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Show failover banner when redirected
function showFailoverBannerIfNeeded() {
  const p = new URLSearchParams(location.search);
  if (p.get('fail') === 'true') {
    const from = p.get('from') || 'primary';
    const time = p.get('time') ? new Date(p.get('time')).toLocaleString() : '';
    const reason = p.get('reason') || 'unreachable';
    const banner = document.getElementById('failoverBannerIndex');
    banner.innerHTML = `<div><strong>Notice:</strong> Previous site (${from}) is down (${reason}). Switched to this site. <small>As of ${time}</small></div>`;
    banner.style.display = 'block';
    document.body.style.paddingTop = '56px';
  }
}
showFailoverBannerIfNeeded();
</script>

</body>
</html>
